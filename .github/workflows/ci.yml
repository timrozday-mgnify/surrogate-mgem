name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff via pre-commit)
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Test
        run: pytest --cov=surrogate_mgem --cov-report=term-missing

  nf-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Nextflow + nf-test
        run: |
          curl -s https://get.nextflow.io | bash && sudo mv nextflow /usr/local/bin/
          curl -fsSL https://code.askimed.com/install/nf-test | bash && sudo mv nf-test /usr/local/bin/

      - name: Stub pipeline test
        run: nf-test test tests/default.nf.test
